# Based on GitHub's official pages/static.yml starter workflow:
# https://github.com/actions/starter-workflows/blob/main/pages/static.yml
name: Deploy Helm repository to Pages

on:
  push:
    tags: ["v*"]
  # In the Actions UI, select the branch/ref whose current Chart should deploy.
  workflow_dispatch:

# Required by actions/deploy-pages. Chart publishing never writes a branch.
permissions:
  contents: read
  pages: write
  id-token: write

# Match the official starter: do not cancel a production deployment in progress.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # A single deployment job builds the complete static site and publishes it.
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # All release tags are needed to reproduce historical chart packages.
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Validate current release
        shell: bash
        run: |
          set -euo pipefail
          helm lint .
          helm template mailserver . --namespace mail > /tmp/mailserver.yaml
          chart_version=$(helm show chart . | awk '$1 == "version:" { print $2 }')

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag_version=${GITHUB_REF_NAME#v}
            if [[ "$chart_version" != "$tag_version" ]]; then
              echo "Chart version ${chart_version} does not match tag ${tag_version}" >&2
              exit 1
            fi

          fi

          # Tag and manual deployments must reference an internally consistent image set.
          for component in postfix dovecot rspamd ldap sogo; do
            image_line=$(grep -E "^  ${component}:" values.yaml)
            if [[ "$image_line" != *"tag: \"${chart_version}\""* ]]; then
              echo "images.${component}.tag must be ${chart_version}" >&2
              exit 1
            fi
          done

      - name: Build static Helm repository
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          REPOSITORY: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          mkdir -p public
          owner=${OWNER,,}
          chart_url="https://${owner}.github.io/${REPOSITORY}"

          package_chart() {
            local source_dir=$1

            helm lint "$source_dir"
            helm package "$source_dir" --destination public
          }

          # Pages artifacts are immutable per run. Rebuild every historical
          # package from Git tags so no writable gh-pages branch is required.
          mapfile -t release_tags < <(git tag --list 'v*' --sort=v:refname)
          for tag in "${release_tags[@]}"; do
            worktree=$(mktemp -d)
            git archive "$tag" | tar -x -C "$worktree"

            # Ignore legacy tags created before this repository became a Chart.
            if [[ ! -f "$worktree/Chart.yaml" ]]; then
              rm -rf "$worktree"
              continue
            fi

            chart_version=$(helm show chart "$worktree" | awk '$1 == "version:" { print $2 }')
            tag_version=${tag#v}
            if [[ "$chart_version" != "$tag_version" ]]; then
              echo "Skipping ${tag}: Chart version is ${chart_version}" >&2
              rm -rf "$worktree"
              continue
            fi

            package_chart "$worktree"
            rm -rf "$worktree"
          done

          # workflow_dispatch publishes the selected ref's HEAD even when it has
          # no release tag yet. If the version already exists, HEAD replaces it.
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            current=$(mktemp -d)
            git archive HEAD | tar -x -C "$current"
            package_chart "$current"
            rm -rf "$current"
          fi

          if ! compgen -G 'public/*.tgz' > /dev/null; then
            echo "No valid Helm packages were generated" >&2
            exit 1
          fi

          helm repo index public --url "$chart_url"
          touch public/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
