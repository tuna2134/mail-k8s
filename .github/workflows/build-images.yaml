name: Build container images

on:
  pull_request:
    paths:
      - "images/**"
      - ".github/workflows/build-images.yaml"
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "images/**"
      - ".github/workflows/build-images.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.component }} (amd64 + arm64)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [postfix, dovecot, rspamd, ldap]

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Compute lowercase GHCR image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repository="${GITHUB_REPOSITORY#*/}"
          echo "name=ghcr.io/${owner}/${repository}-${{ matrix.component }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Fork pull requests are intentionally build-only and never receive a package token.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags and OCI labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=${{ matrix.component }} for mailserver
            org.opencontainers.image.description=Plain ${{ matrix.component }} image for the Kubernetes mail stack

      - name: Build and optionally push
        uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          provenance: mode=max
          sbom: true
