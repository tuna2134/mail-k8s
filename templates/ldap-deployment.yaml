{{- $n := include "mailserver.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata: { name: {{ $n }}-ldap, labels: { app.kubernetes.io/component: ldap } }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app.kubernetes.io/name: {{ $n }}, app.kubernetes.io/component: ldap } }
  template:
    metadata: { labels: { app.kubernetes.io/name: {{ $n }}, app.kubernetes.io/component: ldap } }
    spec:
      automountServiceAccountToken: false
      containers:
        - name: openldap
          image: "{{ .Values.images.ldap.repository }}:{{ .Values.images.ldap.tag }}"
          env:
            - { name: LDAP_BASE_DN, value: {{ .Values.ldap.baseDN | quote }} }
            - { name: LDAP_ORGANIZATION, value: {{ .Values.ldap.organization | quote }} }
            - { name: LDAP_DC, value: {{ .Values.ldap.dc | quote }} }
            - { name: LDAP_ADMIN_DN, value: {{ .Values.ldap.adminDN | quote }} }
            - { name: LDAP_BIND_DN, value: {{ .Values.ldap.bindDN | quote }} }
            - name: LDAP_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Values.ldap.existingSecret }}, key: admin-password } }
            - name: LDAP_BIND_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Values.ldap.existingSecret }}, key: bind-password } }
          ports: [{ name: ldap, containerPort: 389 }]
          readinessProbe: { tcpSocket: { port: ldap }, periodSeconds: 10 }
          resources: {{- toYaml .Values.resources.ldap | nindent 12 }}
          volumeMounts: [{ name: ldap, mountPath: /var/lib/ldap }]
      volumes: [{ name: ldap, persistentVolumeClaim: { claimName: {{ $n }}-ldap } }]

