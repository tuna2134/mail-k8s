apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mailserver.fullname" . }}-haproxy
data:
  haproxy.cfg: |
    # One public LoadBalancer fronts separate Postfix and Dovecot Deployments.
    global
      log stdout format raw local0
    defaults
      mode tcp
      log global
      timeout connect 10s
      timeout client 2m
      timeout server 2m
    frontend smtp
      bind :25
      default_backend postfix-smtp
    backend postfix-smtp
      # PROXY v2 retains the remote IP after crossing the gateway Pod.
      server postfix {{ include "mailserver.fullname" . }}-postfix:25 send-proxy-v2 check
    frontend submissions
      bind :465
      default_backend postfix-submissions
    backend postfix-submissions
      server postfix {{ include "mailserver.fullname" . }}-postfix:465 send-proxy-v2 check
    frontend submission
      bind :587
      default_backend postfix-submission
    backend postfix-submission
      server postfix {{ include "mailserver.fullname" . }}-postfix:587 send-proxy-v2 check
    frontend imaps
      bind :993
      default_backend dovecot-imaps
    backend dovecot-imaps
      server dovecot {{ include "mailserver.fullname" . }}-dovecot:993 send-proxy-v2 check
    frontend acme
      bind :80
      default_backend certbot-http
    backend certbot-http
      server certbot {{ include "mailserver.fullname" . }}-postfix:80 check
