{{- $n := include "mailserver.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata: { name: {{ $n }}-dovecot, labels: { app.kubernetes.io/component: dovecot } }
spec:
  replicas: 1
  # Maildir is stateful; Recreate prevents two writers during an update.
  strategy: { type: Recreate }
  selector: { matchLabels: { app.kubernetes.io/name: {{ $n }}, app.kubernetes.io/component: dovecot } }
  template:
    metadata: { labels: { app.kubernetes.io/name: {{ $n }}, app.kubernetes.io/component: dovecot } }
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: wait-certificate
          image: "{{ .Values.images.certbot.repository }}:{{ .Values.images.certbot.tag }}"
          command: ["/bin/sh","-c"]
          args: ["until test -f /etc/letsencrypt/live/{{ .Values.mail.hostname }}/fullchain.pem; do sleep 10; done"]
          volumeMounts: [{ name: certificates, mountPath: /etc/letsencrypt, readOnly: true }]
      containers:
        - name: dovecot
          image: "{{ .Values.images.dovecot.repository }}:{{ .Values.images.dovecot.tag }}"
          env:
            - { name: POSTMASTER_ADDRESS, value: {{ .Values.mail.postmaster | quote }} }
            - { name: LDAP_URI, value: "ldap://{{ $n }}-ldap:389" }
            - { name: LDAP_BASE_DN, value: {{ .Values.ldap.baseDN | quote }} }
            - { name: LDAP_BIND_DN, value: {{ .Values.ldap.bindDN | quote }} }
            - { name: TLS_CERT, value: "/etc/letsencrypt/live/{{ .Values.mail.hostname }}/fullchain.pem" }
            - { name: TLS_KEY, value: "/etc/letsencrypt/live/{{ .Values.mail.hostname }}/privkey.pem" }
            - name: LDAP_BIND_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Values.ldap.existingSecret }}, key: bind-password } }
          ports: [{ name: lmtp, containerPort: 24 },{ name: imaps, containerPort: 993 }{{ if .Values.sogo.enabled }},{ name: imap-sogo, containerPort: 1143 },{ name: sieve-sogo, containerPort: 4190 }{{ end }},{ name: auth, containerPort: 12345 }]
          readinessProbe: { tcpSocket: { port: imaps }, periodSeconds: 10 }
          livenessProbe: { tcpSocket: { port: imaps }, periodSeconds: 30 }
          resources: {{- toYaml .Values.resources.dovecot | nindent 12 }}
          volumeMounts: [{ name: mail, mountPath: /var/mail },{ name: certificates, mountPath: /etc/letsencrypt, readOnly: true }]
      volumes:
        - { name: mail, persistentVolumeClaim: { claimName: {{ $n }}-mail } }
        - { name: certificates, persistentVolumeClaim: { claimName: {{ $n }}-certificates } }
